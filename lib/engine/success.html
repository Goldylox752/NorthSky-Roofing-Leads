<!DOCTYPE html>
<html lang="en">
<head>

  <style>

      background: #0f172a;

      justify-content: center;
      height: 100vh;
      margin: 0;
      text-align: center;
    }

    .container {
      max-width: 500px;
      padding: 30px;
      background: #111827;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);

    h1 {
      color: #22c55e;
      margin-bottom: 10px;
    }

    p {
      color: #cbd5e1;
      line-height: 1.5;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 20px;
      background: #22c55e;
      color: black;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
    }

    .btn:hover {
      background: #16a34a;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Payment Successful 🚀</h1>
    <p>
      Welcome to RoofFlow.<br><br>
      Your account is being set up now.<br>
      Check your email for login details and next steps.

    <a class="btn" href="/dashboard">Go to Dashboard</a>
